<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CCTV Monitoring System - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="card shadow-sm border-0 w-100" style="max-width: 420px;">
        <div class="card-body p-5">
          <h3 class="card-title mb-3">Create Account</h3>
          <p class="text-muted mb-4">Sign up to access the CCTV monitoring portal.</p>
          <form method="post" class="mb-3">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Choose a strong password" required />
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm" class="form-control" placeholder="Confirm your password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
          </form>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show mt-3" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          <div class="text-center">
            <a href="{{ url_for('auth.login') }}">Already have an account? Sign In</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-0hq4t4EWU1U1wkYf5H5lRZQ7DuffVe4D8Q/1WNncRjxiYxGhPh3BjCzM49+/S0Ss" crossorigin="anonymous"></script>
  </body>
</html>
